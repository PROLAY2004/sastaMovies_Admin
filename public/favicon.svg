<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>

    <!-- TV BODY -->
    <linearGradient id="tvBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#020617"></stop>
    </linearGradient>

    <!-- MULTICOLOR CRT SCREEN -->
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"></stop>
      <stop offset="35%" stop-color="#06b6d4"></stop>
      <stop offset="65%" stop-color="#a855f7"></stop>
      <stop offset="100%" stop-color="#16a34a"></stop>
    </linearGradient>

    <!-- CRT STATIC -->
    <pattern id="noise" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent"></rect>
      <rect y="1" width="3" height="0.35" fill="white" opacity="0.12"></rect>
      <rect y="2" width="3" height="0.25" fill="black" opacity="0.08"></rect>
    </pattern>

    <!-- SCREEN GLOW -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

  </defs>

  <!-- TV BODY -->
  <rect x="8" y="10" width="48" height="44" rx="12" fill="url(#tvBody)"></rect>

  <!-- SCREEN -->
  <rect x="14" y="16" width="36" height="32" rx="6" fill="url(#screen)" filter="url(#glow)"></rect>

  <!-- STATIC -->
  <rect x="14" y="16" width="36" height="32" rx="6" fill="url(#noise)" opacity="0.5"></rect>

  <!-- MAIN TITLE -->
  <text x="32" y="31" text-anchor="middle" dominant-baseline="middle" font-family="Verdana, Arial, sans-serif" font-size="4" font-weight="700" letter-spacing="0.15" fill="#03130a" stroke="white" stroke-width="0.22" opacity="0.95">
    SastaMovies
  </text>

  <!-- ADMIN PANEL BUTTON -->
  <text x="32" y="38" text-anchor="middle" dominant-baseline="middle" font-family="Verdana, Arial, sans-serif" font-size="2.4" font-weight="700" letter-spacing="0.35" fill="#dc2626" stroke="#020617" stroke-width="0.7" paint-order="stroke fill">
    ADMIN PANEL
  </text>

</svg>